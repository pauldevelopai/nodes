# nginx site config for the GROUNDED front door (nodes.developai.co.za)
#
# Serves the static landing page and performs the install-command redirects
# (the _redirects file is for Netlify/Cloudflare; nginx needs these explicit
# location blocks instead). curl -fsSL and PowerShell irm both follow 302s.
#
# Install: see DEPLOY.md. Certbot rewrites this to add the :443 block + an
# HTTP→HTTPS redirect when you run `certbot --nginx`.

server {
    listen 80;
    listen [::]:80;
    server_name nodes.developai.co.za;

    root /var/www/nodes;
    index index.html;

    # ── One-command install URLs → each Node's raw install script ──
    # Add two lines per new Node (keep in sync with _redirects).
    location = /analytics/mac {
        return 302 https://raw.githubusercontent.com/pauldevelopai/node-analytics/main/install.sh;
    }
    location = /analytics/windows {
        return 302 https://raw.githubusercontent.com/pauldevelopai/node-analytics/main/install.ps1;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
